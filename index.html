<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SnowKnights Security — Content Security & TPN Compliance</title>
    <meta
      name="description"
      content="SnowKnights Security offers TPN compliance, content protection, and AI security for media vendors across the EU."
    />

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- React + ReactDOM (UMD) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <!-- Framer Motion UMD exposes window.framerMotion -->
    <script src="https://unpkg.com/framer-motion/dist/framer-motion.umd.js"></script>

    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
      html { scroll-behavior: smooth; }
      button, a { -webkit-tap-highlight-color: transparent; }
      @media (prefers-reduced-motion: reduce) {
        * { animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; }
      }
    </style>
  </head>

  <body class="bg-white text-gray-900">
    <div id="root"></div>

    <script type="text/babel">
      const { useState } = React;
      const { motion } = window.framerMotion;

      function App() {
        const [open, setOpen] = useState(false);
        const SCHED_URL = "https://cal.com/your-handle/30min";
        const fadeUp = {
          initial: { opacity: 0, y: 24 },
          whileInView: { opacity: 1, y: 0 },
          transition: { duration: 0.6, ease: "easeOut" },
          viewport: { once: true }
        };

        return (
          <div className="scroll-smooth bg-white text-gray-900">
            {/* Navbar */}
            <header className="sticky top-0 z-50 w-full border-b border-gray-100 bg-white/80 backdrop-blur supports-[backdrop-filter]:bg-white/60">
              <nav className="mx-auto flex max-w-7xl items-center justify-between px-6 py-4">
                <a href="#home" className="flex items-center gap-2 font-semibold tracking-tight">
                  <span className="inline-flex h-8 w-8 items-center justify-center rounded-xl bg-indigo-600 text-white">
                    SN
                  </span>
                  <span>SnowKnights Security</span>
                </a>
                <div className="hidden items-center gap-8 md:flex">
                  <a href="#services" className="text-sm text-gray-700 hover:text-gray-900">Services</a>
                  <a href="#process" className="text-sm text-gray-700 hover:text-gray-900">Process</a>
                  <a href="#about" className="text-sm text-gray-700 hover:text-gray-900">About</a>
                  <a href={SCHED_URL} target="_blank" className="text-sm text-gray-700 hover:text-gray-900">Contact</a>
                  <a href={SCHED_URL} target="_blank" className="inline-flex items-center rounded-xl border border-indigo-600 px-4 py-2 text-sm font-medium text-indigo-700 hover:bg-indigo-50">Book a call</a>
                </div>
                <button className="md:hidden" onClick={() => setOpen(!open)}>{open ? '✕' : '☰'}</button>
              </nav>
              {open && (
                <div className="border-t border-gray-100 bg-white md:hidden">
                  <div className="mx-auto flex max-w-7xl flex-col gap-2 px-6 py-4">
                    <a href="#services" className="py-2 text-gray-700">Services</a>
                    <a href="#process" className="py-2 text-gray-700">Process</a>
                    <a href="#about" className="py-2 text-gray-700">About</a>
                    <a href="#contact" className="py-2 text-gray-700">Contact</a>
                  </div>
                </div>
              )}
            </header>

            {/* Hero Section */}
            <section id="home" className="py-20 text-center">
              <motion.div {...fadeUp}>
                <h1 className="text-4xl font-semibold">
                  Secure Your Creative Operations.
                  <span className="block text-indigo-600">Achieve & Maintain TPN Compliance.</span>
                </h1>
                <p className="mt-4 max-w-2xl mx-auto text-gray-600">
                  We are qualified TPN Site & Cloud Assessors helping EU vendors secure workflows and pass audits.
                </p>
                <div className="mt-6 flex justify-center gap-3">
                  <a href={SCHED_URL} target="_blank" className="rounded-xl bg-indigo-600 px-5 py-3 text-sm font-medium text-white hover:bg-indigo-700">
                    Book a free 30‑min scoping call
                  </a>
                  <a href="#services" className="rounded-xl border border-gray-200 px-5 py-3 text-sm font-medium text-gray-700 hover:bg-gray-50">
                    Explore services
                  </a>
                </div>
              </motion.div>
            </section>

            {/* Footer */}
            <footer className="border-t border-gray-100 py-6 text-center text-sm text-gray-600">
              © {new Date().getFullYear()} SnowKnights Security
            </footer>
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
  </body>
</html>
